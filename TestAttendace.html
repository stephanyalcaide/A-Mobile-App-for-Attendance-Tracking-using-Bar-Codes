<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="FlyBy">
  <meta name="theme-color" content="#ce1126">
  <link rel="manifest" href="manifest.json">
  <title>FlyBy — IT391</title>

  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/firebase@10.7.1/firebase-app-compat.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/firebase@10.7.1/firebase-firestore-compat.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #ffffff;
      --bg2:      #f8f9fa;
      --bg3:      #e9ecef;
      --border:   rgba(0,0,0,0.10);
      --border2:  rgba(0,0,0,0.18);
      --text:     #000000;
      --text2:    #495057;
      --text3:    #868e96;
      --green:    #18794e;
      --green-bg: #effaf4;
      --green-br: rgba(24,121,78,0.22);
      --red:      #ce1126;
      --red-bg:   #fff0f0;
      --amber:    #92400e;
      --amber-bg: #fffbeb;
      --amber-br: rgba(146,64,14,0.2);
      --blue:     #185fa5;
      --blue-bg:  #e8f2fc;
      --r-md:     8px;
      --r-lg:     14px;
      --scan-h:   250px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:       #121212;
        --bg2:      #1e1e1e;
        --bg3:      #000000;
        --border:   rgba(255,255,255,0.09);
        --border2:  rgba(255,255,255,0.16);
        --text:     #ffffff;
        --text2:    #d4d4d8;
        --text3:    #9ca3af;
        --green:    #4cc38a;
        --green-bg: #0d2b1d;
        --green-br: rgba(76,195,138,0.22);
        --red:      #ce1126;
        --red-bg:   #2e1213;
        --amber:    #fbbf24;
        --amber-bg: #1c1500;
        --amber-br: rgba(251,191,36,0.2);
        --blue:     #6badea;
        --blue-bg:  #0c2340;
      }
    }

    body {
      font-family: 'Fira Code', 'Fira Mono', monospace;
      background: var(--bg3);
      min-height: 100vh;
      display: flex; align-items: flex-start; justify-content: center;
      padding: 1rem 0.75rem 3rem;
    }

    #app {
      width: 100%; max-width: 390px;
      background: var(--bg);
      border-radius: var(--r-lg);
      border: 0.5px solid var(--border);
      overflow: hidden;
    }

    /* ── Shared ───────────────────────────────────────── */
    .header { padding: 1.1rem 1.1rem 0.9rem; border-bottom: 0.5px solid var(--border); }
    .header-row { display: flex; align-items: center; justify-content: space-between; }
    .header-label { font-size: 10px; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text3); margin-bottom: 3px; }
    .header-title { font-size: 20px; font-weight: 500; color: var(--text); }
    .header-sub   { font-size: 13px; color: var(--text2); margin-top: 2px; }

    .btn {
      display: block; width: 100%; padding: 0.7rem 1rem;
      font-size: 14px; font-weight: 500; text-align: center;
      border: 0.5px solid var(--border2); border-radius: var(--r-md);
      background: var(--bg); color: var(--text);
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: background 0.12s;
    }
    .btn:active { background: var(--bg2); }
    .btn.primary { background: var(--red); color: #ffffff; border-color: transparent; }
    .btn.primary:active { opacity: 0.85; }
    .btn.ghost  { border-color: var(--border); color: var(--text2); font-size: 13px; }
   .btn.danger { border-color: var(--amber-br); color: var(--amber); font-size: 13px; }
    .btn.sm     { padding: 0.4rem 0.8rem; font-size: 12px; width: auto; }

    /* ── Login ────────────────────────────────────────── */
    .login-wrap { padding: 2rem 1.25rem 1.5rem; display: flex; flex-direction: column; gap: 0.75rem; }
    .login-logo { display: flex; flex-direction: column; align-items: center; margin-bottom: 1rem; gap: 6px; }
    .login-logo-title { font-size: 22px; font-weight: 600; color: var(--red); letter-spacing: -0.01em; }
    .login-logo-sub   { font-size: 12px; color: var(--text3); }

    .input-group { display: flex; flex-direction: column; gap: 4px; }
    .input-label { font-size: 11px; color: var(--text2); letter-spacing: 0.04em; text-transform: uppercase; }
    .input-field {
      padding: 0.65rem 0.85rem; font-size: 14px; color: var(--text);
      background: var(--bg2); border: 0.5px solid var(--border2);
      border-radius: var(--r-md); outline: none; width: 100%;
    }
    .input-field:focus { border-color: var(--red); }
    .login-error {
      font-size: 12px; color: var(--red);
      background: var(--red-bg); border: 0.5px solid rgba(206,17,38,0.2);
      border-radius: var(--r-md); padding: 0.5rem 0.75rem; display: none;
    }
    .login-error.show { display: block; }

    /* ── Student rows ─────────────────────────────────── */
    .student-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.6rem 1rem; border-bottom: 0.5px solid var(--border);
      transition: background 0.15s;
    }
    .student-row:last-child { border-bottom: none; }
    .student-row.present { background: var(--green-bg); }
    .student-row.late    { background: var(--amber-bg); }

    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: #000000; color: #ffffff;
      font-size: 11px; font-weight: 500;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .avatar.present { background: var(--green-bg); color: var(--green); }
    .avatar.late    { background: var(--amber-bg);  color: var(--amber); }

    .student-info { flex: 1; margin: 0 10px; }
    .student-name { font-size: 13px; font-weight: 500; color: var(--text); }
    .student-name.present { color: var(--green); }
    .student-name.late    { color: var(--amber); }
    .student-barcode { font-size: 11px; color: var(--text3); font-family: 'SF Mono', 'Menlo', monospace; margin-top: 1px; }

    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border2); flex-shrink: 0; }
    .status-dot.present { background: var(--green); }
    .status-dot.late    { background: var(--amber); }

    .late-badge {
      font-size: 9px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
      color: var(--amber); background: var(--amber-bg);
      border: 0.5px solid var(--amber-br); border-radius: 4px;
      padding: 1px 5px; margin-left: 4px;
    }

    .section-label {
      font-size: 10px; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text3);
      padding: 0.6rem 1rem 0.35rem;
      border-bottom: 0.5px solid var(--border);
      background: var(--bg2);
      display: flex; align-items: center; justify-content: space-between;
    }

    /* ── Scan screen ──────────────────────────────────── */
    .scan-bar { display: flex; align-items: center; justify-content: space-between; padding: 0.6rem 1rem; border-bottom: 0.5px solid var(--border); }
    .live-badge { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 500; color: var(--green); }
    .live-dot   { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

    .timer-display { font-size: 22px; font-weight: 500; font-family: 'SF Mono', 'Menlo', monospace; color: var(--text); letter-spacing: -0.02em; }
    .timer-display.urgent { color: var(--red); }
    .count-badge { font-size: 12px; color: var(--text2); background: var(--bg2); border: 0.5px solid var(--border); border-radius: 20px; padding: 2px 9px; }

    #camera-wrap { position: relative; height: var(--scan-h); background: #0a0a0a; overflow: hidden; }
    #camera-wrap video, #camera-wrap canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
    #camera-wrap canvas { display: none; }

    .reticle { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 240px; height: 68px; pointer-events: none; }
    .reticle::before,.reticle::after,.reticle-inner::before,.reticle-inner::after { content: ''; position: absolute; width: 18px; height: 18px; border-color: #22d3ee; border-style: solid; }
    .reticle::before  { top:0;    left:0;  border-width: 1.5px 0 0 1.5px; }
    .reticle::after   { top:0;    right:0; border-width: 1.5px 1.5px 0 0; }
    .reticle-inner::before { bottom:0; left:0;  border-width: 0 0 1.5px 1.5px; }
    .reticle-inner::after  { bottom:0; right:0; border-width: 0 1.5px 1.5px 0; }
    .scanline { position: absolute; left: 8px; right: 8px; height: 1.5px; background: #22d3ee; animation: scanline 2.2s linear infinite; }
    @keyframes scanline { 0%{top:6px} 100%{top:calc(100% - 6px)} }
    .camera-hint { position: absolute; bottom: 8px; left: 0; right: 0; text-align: center; font-size: 10px; color: rgba(255,255,255,0.4); }

    .scan-toast { padding: 0.55rem 1rem; font-size: 12px; font-weight: 500; min-height: 36px; display: flex; align-items: center; gap: 6px; border-bottom: 0.5px solid var(--border); }
    .scan-toast.ok    { background: var(--green-bg); color: var(--green); border-color: var(--green-br); }
    .scan-toast.late  { background: var(--amber-bg); color: var(--amber); border-color: var(--amber-br); }
    .scan-toast.empty { background: var(--bg2);      color: var(--text3); font-weight: 400; }

    /* ── Summary ──────────────────────────────────────── */
    .summary-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.5rem; padding: 1rem; border-bottom: 0.5px solid var(--border); }
    .stat-card  { background: var(--bg2); border-radius: var(--r-md); padding: 0.7rem 0.8rem; }
    .stat-label { font-size: 11px; color: var(--text3); margin-bottom: 3px; }
    .stat-value { font-size: 24px; font-weight: 500; color: var(--text); }
    .stat-value.green { color: var(--green); }
    .stat-value.red   { color: var(--red); }
    .stat-value.amber { color: var(--amber); }

    .summary-row { display: flex; align-items: center; justify-content: space-between; padding: 0.65rem 1rem; border-bottom: 0.5px solid var(--border); }
    .summary-row:last-child { border-bottom: none; }
    .check-icon { font-size: 13px; color: var(--green); margin-right: 4px; }
    .x-icon     { font-size: 13px; color: var(--red);   margin-right: 4px; }

    /* ── History ──────────────────────────────────────── */
    .history-session { padding: 0.75rem 1rem; border-bottom: 0.5px solid var(--border); }
    .history-session:last-child { border-bottom: none; }
    .history-date { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
    .history-meta { font-size: 11px; color: var(--text2); margin-bottom: 6px; }
    .history-pills { display: flex; flex-wrap: wrap; gap: 4px; }
    .history-pill { font-size: 11px; padding: 2px 8px; border-radius: 20px; border: 0.5px solid var(--border); }
    .history-pill.present { background: var(--green-bg); color: var(--green); border-color: var(--green-br); }
    .history-pill.late    { background: var(--amber-bg); color: var(--amber); border-color: var(--amber-br); }
    .history-pill.absent  { background: var(--bg2);      color: var(--text3); }

    .empty-state { padding: 2.5rem 1rem; text-align: center; color: var(--text3); font-size: 13px; }

    .firebase-note { margin: 1rem; padding: 0.7rem 0.8rem; background: var(--bg2); border-radius: var(--r-md); border: 0.5px solid var(--border); font-size: 11px; color: var(--text2); line-height: 1.6; }
    .firebase-note a { color: var(--blue); text-decoration: none; }
    .footer-buttons { padding: 1rem; display: flex; flex-direction: column; gap: 0.5rem; }

    .cam-error { display: flex; flex-direction: column; align-items: center; justify-content: center; height: var(--scan-h); background: #0a0a0a; gap: 6px; }
    .cam-error p { font-size: 12px; color: rgba(255,255,255,0.45); text-align: center; padding: 0 1.5rem; }

    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border2); border-top-color: var(--text); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Typing animation ─────────────────────────────── */
    .typing-wrap {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .typing-line {
      font-family: 'Fira Code', monospace;
      font-size: 32px; font-weight: 600;
      color: var(--red);
      overflow: hidden;
      white-space: nowrap;
      width: 0;
      border-right: 2px solid var(--red);
      animation: typeIn 0.7s steps(5, end) 0.2s forwards,
                 cursorBlink 0.8s step-end 0.9s 3,
                 cursorFade 0.1s ease 3.3s forwards;
    }
    .typing-sub {
      font-family: 'Fira Code', monospace;
      font-size: 11px; color: var(--text3);
      overflow: hidden; white-space: nowrap;
      width: 0; opacity: 0;
      animation: typeInSub 0.5s steps(28, end) 1.1s forwards;
    }
    @keyframes typeIn {
      from { width: 0; }
      to   { width: 5ch; }
    }
    @keyframes typeInSub {
      from { width: 0; opacity: 1; }
      to   { width: 28ch; opacity: 1; }
    }
    @keyframes cursorBlink {
      0%,100% { border-color: var(--red); }
      50%     { border-color: transparent; }
    }
    @keyframes cursorFade {
      to { border-color: transparent; }
    }
  </style>
</head>
<body>
<main id="app"></main>

<script>

/* ─── CONFIG ──────────────────────────────────────────── */

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBVFXnOnK9_uCfgLDRrgRfykHVSvcJ0Fe8",
  authDomain: "mobiletracking-a53ac.firebaseapp.com",
  projectId: "mobiletracking-a53ac",
  storageBucket: "mobiletracking-a53ac.firebasestorage.app",
  messagingSenderId: "235704110221",
  appId: "1:235704110221:web:2b79cc60e34ee315dc66c4"
};

const SESSION_SECONDS = 360;
const LATE_THRESHOLD  = 120; // last 2 min = late

/* ─── Firebase ────────────────────────────────────────── */

/* ─── HARDCODED LOGIN ─────────────────────────────────── */
// Change these to whatever the professor wants
const PROFESSOR_EMAIL    = 'professor@ilstu.edu';
const PROFESSOR_PASSWORD = 'Redbirds2026';

firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.firestore();

/* ─── State ───────────────────────────────────────────── */

let STUDENTS      = [];
let phase         = 'login';
let currentUser   = null;
let remaining     = SESSION_SECONDS;
let attendance    = {};
let timerID       = null;
let sessionDocID  = null;
let lastToastTO   = null;
let cameraRunning = false;
let historyData   = [];
let birdInterval  = null;

/* ─── Auth ────────────────────────────────────────────── */

async function login() {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('pass').value;
  const errEl = document.getElementById('login-err');
  const btn   = document.getElementById('login-btn');
  errEl.classList.remove('show');
  btn.innerHTML = '<span class="spinner"></span>';
  btn.disabled = true;

  // Simulate a brief loading delay so it feels real
  await new Promise(r => setTimeout(r, 600));

  if (email === PROFESSOR_EMAIL && pass === PROFESSOR_PASSWORD) {
    currentUser = { email };
    phase = 'ready';
    fetchStudents();
  } else {
    errEl.textContent = 'Incorrect email or password.';
    errEl.classList.add('show');
    btn.innerHTML = 'Sign in';
    btn.disabled = false;
  }
}

function logout() {
  stopCamera();
  clearInterval(timerID);
  clearInterval(birdInterval);
  currentUser = null;
  phase = 'login';
  render();
  setTimeout(initBird, 0);
}

/* ─── Student fetch ───────────────────────────────────── */

async function fetchStudents() {
  try {
    const snapshot = await db.collection('Students').get();
    STUDENTS = [];
    snapshot.forEach(doc => {
      STUDENTS.push({ id: doc.id, name: doc.data().name, barcode: doc.id });
    });
    render();
    setTimeout(initBird, 0);
  } catch(e) {
    console.warn('[Firebase] Failed to fetch students:', e.message);
    render();
    setTimeout(initBird, 0);
  }
}

/* ─── Session ─────────────────────────────────────────── */

async function startSession() {
  attendance = {}; remaining = SESSION_SECONDS; sessionDocID = null;
  phase = 'scanning';

  try {
    const ref = await db.collection('sessions').add({
      date:       new Date().toLocaleDateString('en-CA'),
      startedAt:  firebase.firestore.FieldValue.serverTimestamp(),
      endedAt:    null,
      attendance: {},
      professor:  currentUser ? currentUser.email : 'unknown',
    });
    sessionDocID = ref.id;
  } catch(e) { console.warn('[Firebase] session create failed:', e.message); }

  render();
  clearInterval(timerID);
  timerID = setInterval(() => {
    remaining--;
    if (remaining <= 0) { clearInterval(timerID); endSession(); }
    else updateTimer();
  }, 1000);
  requestAnimationFrame(() => startCamera());
}

async function recordScan(barcodeValue) {
  const student = STUDENTS.find(s =>
    s.barcode.trim().toLowerCase() === barcodeValue.trim().toLowerCase()
  );
  if (!student) { showToast('Unknown ID: ' + barcodeValue, 'empty'); return; }
  if (attendance[student.id]) return;

  const scannedAt = new Date();
  const isLate    = remaining < LATE_THRESHOLD;
  attendance[student.id] = { name: student.name, scannedAt, late: isLate };
  showToast(isLate ? student.name + ' — marked late' : student.name + ' marked present', isLate ? 'late' : 'ok');
  updateRoster();

  try {
    await db.collection('sessions').doc(sessionDocID).update({
      ['attendance.' + student.id]: {
        name:      student.name,
        scannedAt: firebase.firestore.Timestamp.fromDate(scannedAt),
        late:      isLate,
      }
    });
  } catch(e) { console.warn('[Firebase] attendance write failed:', e.message); }
}

async function endSession() {
  stopCamera(); phase = 'summary';
  try {
    await db.collection('sessions').doc(sessionDocID).update({
      endedAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
  } catch(e) { console.warn('[Firebase] session close failed:', e.message); }
  render();
}

function resetApp() {
  phase = 'ready'; attendance = {}; remaining = SESSION_SECONDS; sessionDocID = null;
  render(); setTimeout(initBird, 0);
}

/* ─── History ─────────────────────────────────────────── */
async function showHistory() {
  phase = 'history'; historyData = []; render();
  try {
    // Only grab the 10 most recent sessions
    const snap = await db.collection('sessions').orderBy('startedAt', 'desc').limit(10).get();
    historyData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch(e) { 
    console.warn('[Firebase] history load failed:', e.message); 
  }
  render();
}

/* ─── Camera ──────────────────────────────────────────── */

function startCamera() {
  if (cameraRunning) return;
  const wrap = document.getElementById('camera-wrap');
  if (!wrap) return;
  Quagga.init({
    inputStream: {
      type: 'LiveStream', target: wrap,
      constraints: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 320 } },
    },
    decoder: {
      readers: ['code_128_reader','code_39_reader','code_93_reader','ean_reader','ean_8_reader','upc_reader','upc_e_reader','codabar_reader','i2of5_reader'],
      debug: { showCanvas: false, drawBoundingBox: false, showFrequency: false },
    },
    locate: true, frequency: 8,
  }, err => {
    if (err) {
      const w = document.getElementById('camera-wrap');
      if (w) w.innerHTML = '<div class="cam-error"><p>Camera access denied or unavailable.</p><p>Open this page in Safari and allow camera permissions.</p></div>';
      return;
    }
    Quagga.start(); cameraRunning = true;
  });
  let lastVal = null, lastTime = 0;
  Quagga.onDetected(result => {
    const val = result.codeResult.code, now = Date.now();
    if (val === lastVal && now - lastTime < 1500) return;
    lastVal = val; lastTime = now;
    console.log('[Scan] Detected:', val, result.codeResult.format);
    recordScan(val);
  });
}

function stopCamera() {
  if (!cameraRunning) return;
  try { Quagga.stop(); } catch(e) {}
  cameraRunning = false;
}

/* ─── Helpers ─────────────────────────────────────────── */

function fmt(s) { return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0'); }
function fmtTime(d) {
  if (!d) return '';
  const date = d instanceof Date ? d : (d.toDate ? d.toDate() : new Date(d));
  return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}
function presentCount() { return Object.values(attendance).filter(a => !a.late).length; }
function lateCount()    { return Object.values(attendance).filter(a =>  a.late).length; }

function updateTimer() {
  const el = document.getElementById('timer');
  if (!el) return;
  el.textContent = fmt(remaining);
  el.className = 'timer-display' + (remaining <= 60 ? ' urgent' : '');
}

function updateRoster() {
  STUDENTS.forEach(s => {
    const row = document.getElementById('row-' + s.id);
    if (!row) return;
    const a = attendance[s.id];
    const present = !!a && !a.late, late = !!a && a.late;
    const time = a ? fmtTime(a.scannedAt) : '—';
    row.className = 'student-row' + (present ? ' present' : late ? ' late' : '');
    row.querySelector('.avatar').className      = 'avatar'       + (present ? ' present' : late ? ' late' : '');
    row.querySelector('.student-name').className= 'student-name' + (present ? ' present' : late ? ' late' : '');
    row.querySelector('.status-dot').className  = 'status-dot'   + (present ? ' present' : late ? ' late' : '');
    row.querySelector('.scan-time').textContent = time;
    const lb = row.querySelector('.late-badge');
    if (lb) lb.style.display = late ? 'inline' : 'none';
  });
  const c = document.getElementById('scan-count');
  if (c) c.textContent = (presentCount() + lateCount()) + ' / ' + STUDENTS.length;
}

function showToast(msg, type = 'ok') {
  const el = document.getElementById('scan-toast');
  if (!el) return;
  el.className = 'scan-toast ' + type;
  el.innerHTML = type === 'ok' ? '✓ ' + msg : type === 'late' ? '⏱ ' + msg : msg;
  clearTimeout(lastToastTO);
  lastToastTO = setTimeout(() => {
    const e2 = document.getElementById('scan-toast');
    if (e2) { e2.className = 'scan-toast empty'; e2.textContent = 'Waiting for barcode...'; }
  }, 2500);
}

/* ─── Render ──────────────────────────────────────────── */

function render() {
  const app = document.getElementById('app');
  const today = new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });

  /* LOGIN */
  if (phase === 'login') {
    app.innerHTML = `
      <div class="login-wrap">
        <div class="login-logo">
          <canvas id="redbird" width="80" height="80" style="image-rendering:pixelated;width:80px;height:80px;"></canvas>
          <div class="typing-wrap">
            <div class="typing-line">FlyBy</div>
            <div class="typing-sub">IT391 · Professor sign-in</div>
          </div>
        </div>
        <div class="input-group">
          <div class="input-label">Email</div>
          <input id="email" class="input-field" type="email" placeholder="professor@ilstu.edu" autocomplete="email">
        </div>
        <div class="input-group">
          <div class="input-label">Password</div>
          <input id="pass" class="input-field" type="password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <div id="login-err" class="login-error"></div>
        <button id="login-btn" class="btn primary" onclick="login()">Sign in</button>
        <p style="font-size:11px;color:var(--text3);text-align:center;line-height:1.5;">
          Use the credentials set in the app config
        </p>
      </div>`;
    setTimeout(initBird, 0);
    document.getElementById('pass').addEventListener('keydown', e => { if(e.key==='Enter') login(); });
    return;
  }

  /* READY */
  if (phase === 'ready') {
    app.innerHTML = `
      <div class="header">
        <div class="header-row">
          <div>
            <p class="header-label">Attendance Tracker</p>
            <p class="header-title">IT391</p>
            <p class="header-sub">${today}</p>
          </div>
          <canvas id="redbird" width="64" height="64" style="image-rendering:pixelated;width:64px;height:64px;"></canvas>
        </div>
      </div>

      <div class="section-label">
        <span>Registered students</span>
        <span style="color:var(--text3);font-size:10px;">${currentUser ? currentUser.email : ''}</span>
      </div>

      ${STUDENTS.length === 0
        ? '<div class="empty-state">Loading students...</div>'
        : STUDENTS.map((s, i) => `
          <div class="student-row">
            <div class="avatar">M${i+1}</div>
            <div class="student-info">
              <div class="student-name">${s.name}</div>
              <div class="student-barcode">${s.barcode}</div>
            </div>
          </div>`).join('')}

      <div class="firebase-note">
        Firebase connected · Sessions save to <strong>${FIREBASE_CONFIG.projectId}</strong>
      </div>

      <div class="footer-buttons">
        <button class="btn primary" onclick="startSession()">Begin 6-minute session</button>
        <button class="btn ghost"   onclick="showHistory()">View attendance history</button>
        <button class="btn danger"  onclick="logout()">Sign out</button>
      </div>`;
    setTimeout(initBird, 0);
    return;
  }

  /* SCANNING */
  if (phase === 'scanning') {
    app.innerHTML = `
      <div class="scan-bar">
        <div class="live-badge"><div class="live-dot"></div>Live</div>
        <span id="timer" class="timer-display">${fmt(remaining)}</span>
        <span id="scan-count" class="count-badge">${presentCount()+lateCount()} / ${STUDENTS.length}</span>
      </div>

      <div id="camera-wrap">
        <div class="reticle"><div class="reticle-inner"></div><div class="scanline"></div></div>
        <div class="camera-hint">Hold student ID barcode in frame</div>
      </div>

      <div id="scan-toast" class="scan-toast empty">Waiting for barcode...</div>

      <div class="section-label">
        <span>Live roster</span>
        <span style="color:var(--amber);font-size:10px;">⏱ = late arrival</span>
      </div>

      ${STUDENTS.map(s => `
        <div class="student-row" id="row-${s.id}">
          <div class="avatar">M${STUDENTS.indexOf(s)+1}</div>
          <div class="student-info">
            <div class="student-name">${s.name}<span class="late-badge" style="display:none">Late</span></div>
            <div class="student-barcode">${s.barcode}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="scan-time" style="font-size:11px;color:var(--text3);font-family:monospace;">—</span>
            <div class="status-dot"></div>
          </div>
        </div>`).join('')}

      <div class="footer-buttons">
        <button class="btn ghost" onclick="endSession()">End session early</button>
      </div>`;
    return;
  }

  /* SUMMARY */
  if (phase === 'summary') {
    const pc = presentCount(), lc = lateCount(), ac = STUDENTS.length - pc - lc;
    app.innerHTML = `
      <div class="header">
        <p class="header-label">Session complete</p>
        <p class="header-title">Attendance summary</p>
        <p class="header-sub">${today}</p>
      </div>

      <div class="summary-stats">
        <div class="stat-card"><div class="stat-label">Present</div><div class="stat-value green">${pc}</div></div>
        <div class="stat-card"><div class="stat-label">Late</div><div class="stat-value amber">${lc}</div></div>
        <div class="stat-card"><div class="stat-label">Absent</div><div class="stat-value red">${ac}</div></div>
      </div>

      <div class="section-label"><span>Final roster</span></div>

      ${STUDENTS.map(s => {
        const a = attendance[s.id];
        const present = !!a && !a.late, late = !!a && a.late;
        const color = present ? 'var(--green)' : late ? 'var(--amber)' : 'var(--text2)';
        const icon  = present ? '✓' : late ? '⏱' : '✕';
        const label = present ? 'On time' : late ? 'Late' : 'Absent';
        return `
        <div class="summary-row" style="background:${present?'var(--green-bg)':late?'var(--amber-bg)':'var(--bg)'}">
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:13px;color:${color}">${icon}</span>
            <span style="font-size:13px;font-weight:500;color:${color}">${s.name}</span>
          </div>
          <div style="display:flex;align-items:center;gap:6px;">
            ${a ? `<span style="font-size:11px;font-family:monospace;color:${color}">${fmtTime(a.scannedAt)}</span>` : ''}
            <span style="font-size:10px;color:${color};opacity:0.8">${label}</span>
          </div>
        </div>`;
      }).join('')}

      <div class="firebase-note">
        ${sessionDocID
          ? `Saved to Firebase · Session ID: <code style="font-size:10px;">${sessionDocID}</code>`
          : 'Session saved locally.'}
      </div>

      <div class="footer-buttons">
        <button class="btn primary" onclick="resetApp()">New session</button>
        <button class="btn ghost"   onclick="showHistory()">View history</button>
      </div>`;
    return;
  }

  /* HISTORY */
  if (phase === 'history') {
    app.innerHTML = `
      <div class="header">
        <div class="header-row">
          <div>
            <p class="header-label">IT391</p>
            <p class="header-title">Attendance history</p>
          </div>
          <button class="btn sm ghost" onclick="resetApp()">Back</button>
        </div>
      </div>

      ${historyData.length === 0
        ? '<div class="empty-state"><div class="spinner" style="margin:0 auto 8px"></div>Loading sessions...</div>'
        : historyData.map(session => {
            const att   = session.attendance || {};
            const studs = STUDENTS.map(s => {
              const rec = att[s.id];
              if (!rec) return { name: s.name, status: 'absent', time: null };
              return { name: s.name, status: rec.late ? 'late' : 'present', time: fmtTime(rec.scannedAt) };
            });
            const pc2 = studs.filter(s => s.status === 'present').length;
            const lc2 = studs.filter(s => s.status === 'late').length;
            const startTime = session.startedAt ? fmtTime(session.startedAt) : '';
            return `
            <div class="history-session">
              <div class="history-date">${session.date || 'Unknown date'}</div>
              <div class="history-meta">${startTime ? 'Started ' + startTime + ' · ' : ''}${pc2} present · ${lc2} late · ${STUDENTS.length - pc2 - lc2} absent</div>
              <div class="history-pills">
                ${studs.map(s => `
                  <span class="history-pill ${s.status}">
                    ${s.name}${s.time ? ' ' + s.time : ''}${s.status === 'late' ? ' ⏱' : ''}
                  </span>`).join('')}
              </div>
            </div>`;
          }).join('')}`;
    return;
  }
}

render();

/* ─── Animated redbird ────────────────────────────────── */
function initBird() {
  clearInterval(birdInterval);
  const CV = document.getElementById('redbird');
  if (!CV) return;
  const cx = CV.getContext('2d');
  cx.imageSmoothingEnabled = false;
  const Z = CV.width / 16;
  const _R='#cc0000',_M='#aa0000',_D='#880000',_X='#550000',_H='#ee3333',
        _K='#0d0d0d',_Y='#ffcc00',_O='#e07020',_B='#b04800',_W='#8b5e3c',_G='#c45c00';
  function p(x,y,c){cx.fillStyle=c;cx.fillRect(x*Z,y*Z,Z,Z);}
  function base(){
    p(9,0,_R);p(8,1,_R);p(9,1,_R);p(7,2,_R);p(8,2,_R);p(9,2,_R);
    p(7,3,_R);p(8,3,_R);p(9,3,_R);p(10,3,_R);p(8,4,_R);p(9,4,_R);p(10,4,_R);p(11,4,_R);
    p(7,5,_R);p(8,5,_R);p(9,5,_R);p(10,5,_R);p(11,5,_R);p(12,5,_R);
    p(9,6,_R);p(10,6,_R);p(13,6,_R);p(14,6,_R);
    p(9,7,_R);p(10,7,_R);p(11,7,_R);p(12,7,_R);p(13,7,_R);
    p(9,8,_R);p(10,8,_R);p(11,8,_R);p(12,8,_R);
    p(4,5,_K);p(5,5,_K);p(6,5,_K);p(7,5,_K);
    p(4,6,_K);p(5,6,_K);p(6,6,_K);p(7,6,_K);p(8,6,_K);p(9,6,_K);p(10,6,_K);p(11,6,_K);p(12,6,_K);
    p(4,7,_K);p(5,7,_K);p(6,7,_K);p(7,7,_K);p(8,7,_K);
    p(5,8,_K);p(6,8,_K);p(7,8,_K);
    p(11,6,_K);p(12,6,_Y);
    p(14,6,_O);p(15,6,_O);p(16,6,_O);p(17,6,_O);
    p(14,7,_O);p(15,7,_O);p(16,7,_O);p(17,7,_O);p(18,7,_O);
    p(14,8,_B);p(15,8,_B);p(16,8,_B);p(17,8,_B);
    p(8,8,_R);p(9,8,_R);p(10,8,_R);p(11,8,_R);p(12,8,_R);p(13,8,_R);
    p(7,9,_R);p(8,9,_R);p(9,9,_R);p(10,9,_R);p(11,9,_R);p(12,9,_R);p(13,9,_R);
    for(let x=4;x<=13;x++){p(x,10,_R);p(x,11,_R);p(x,12,_R);}
    for(let x=5;x<=13;x++) p(x,13,_R);
    for(let x=5;x<=12;x++) p(x,14,_R);
    for(let x=6;x<=11;x++) p(x,15,_R);
    for(let x=7;x<=10;x++) p(x,16,_R);
    p(4,10,_M);p(4,11,_M);p(4,12,_M);p(5,13,_M);p(5,14,_M);
    p(9,10,_H);p(10,10,_H);p(9,11,_H);p(10,11,_H);
    p(3,11,_M);p(3,12,_M);
    p(12,13,_D);p(12,14,_D);p(11,14,_D);
    p(14,10,_M);p(15,10,_M);p(16,10,_D);
    p(14,11,_D);p(15,11,_D);p(16,11,_X);p(17,11,_X);
    p(14,12,_D);p(15,12,_X);p(16,12,_X);
    p(13,13,_D);p(14,13,_X);p(15,13,_X);
    p(13,14,_X);p(14,14,_X);p(13,15,_X);
    p(7,17,_G);p(7,18,_G);p(7,19,_G);p(9,17,_G);p(9,18,_G);p(9,19,_G);
    p(5,20,_G);p(6,20,_G);p(7,20,_G);p(8,20,_G);p(9,20,_G);p(10,20,_G);p(11,20,_G);
    p(4,20,_W);p(12,20,_W);
  }
  const frames=[
    {L:[[3,12],[3,13],[2,12],[2,13]],R:[[12,14],[11,15],[12,15]]},
    {L:[[3,11],[3,12],[2,11],[2,12]],R:[[12,13],[11,14],[12,14]]},
    {L:[[2,10],[3,11],[2,11],[3,12]],R:[[12,13],[11,13],[12,14]]},
    {L:[[2,9],[3,10],[2,10],[3,11]], R:[[11,12],[12,13],[11,13]]},
    {L:[[2,10],[3,11],[2,11],[3,12]],R:[[12,13],[11,13],[12,14]]},
    {L:[[3,12],[3,13],[2,12],[2,13]],R:[[12,14],[11,15],[12,15]]},
    {L:[[3,13],[3,14],[2,13],[2,14]],R:[[12,15],[11,15],[12,16]]},
    {L:[[3,14],[3,15],[2,14],[2,15]],R:[[12,15],[12,16],[11,16]]},
    {L:[[3,14],[3,15],[2,15],[3,16]],R:[[12,16],[12,17],[11,16]]},
    {L:[[3,13],[3,14],[2,13],[2,14]],R:[[12,15],[11,15],[12,16]]},
  ];
  let f = 0;
  function draw(){
    cx.clearRect(0,0,CV.width,CV.height); base();
    for(const [x,y] of frames[f].L) p(x,y,_M);
    for(const [x,y] of frames[f].R) p(x,y,_D);
  }
  draw();
  birdInterval = setInterval(() => { f=(f+1)%frames.length; draw(); }, 150);
}

 

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/Attendance/sw.js'));
}
</script>
