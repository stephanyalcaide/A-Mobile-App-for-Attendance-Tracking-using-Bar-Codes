<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FlyBy">
  <meta name="theme-color" content="#CE1126">
  <link rel="manifest" href="manifest.json">
  <title>FlyBy — ISU Attendance</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<main id="app"></main>

<script src="https://cdn.jsdelivr.net/npm/firebase@10.7.1/firebase-app-compat.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@10.7.1/firebase-firestore-compat.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --isu:#CE1126;--isu-dark:#A50D1E;--isu-light:#FDECEA;
  --bg:#FFFFFF;--bg2:#F5F5F5;--bg3:#EBEBEB;
  --border:rgba(0,0,0,0.10);--border2:rgba(0,0,0,0.18);
  --text:#212121;--text2:#595959;--text3:#9E9E9E;
  --green:#1E7E4A;--green-bg:#E8F5E9;--green-br:rgba(30,126,74,0.2);
  --amber:#92400e;--amber-bg:#FFF8E1;--amber-br:rgba(146,64,14,0.2);
  --red:#CE1126;--red-bg:#FDECEA;--blue:#1565C0;--blue-bg:#E3F2FD;
  --r-sm:6px;--r-md:10px;--r-lg:16px;--scan-h:280px;--header-h:56px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#121212;--bg2:#1e1e1e;--bg3:#000000;
    --border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.16);
    --text:#ffffff;--text2:#d4d4d8;--text3:#9ca3af;
    --green:#4cc38a;--green-bg:#0d2b1d;--green-br:rgba(76,195,138,0.22);
    --amber:#fbbf24;--amber-bg:#1c1500;--amber-br:rgba(251,191,36,0.2);
    --red:#CE1126;--red-bg:#2e1213;--blue:#6badea;--blue-bg:#0c2340;--isu-light:#2e1213;
  }
}

html, body { margin: 0; padding: 0; height: 100%; width: 100%; }
body {
  font-family: 'Fira Code', 'Fira Mono', monospace; background: var(--bg3);
  display: flex; align-items: center; justify-content: center; padding: 1rem; box-sizing: border-box;
}
#app {
  width: 100%; max-width: 550px; height: 95vh; background: var(--bg);
  border-radius: var(--r-lg); border: 0.5px solid var(--border); box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  display: flex; flex-direction: column; overflow: hidden;
}

/* --- SMOOTH PAGE TRANSITIONS --- */
@keyframes pageEnter {
  0% { opacity: 0; transform: translateY(16px); }
  100% { opacity: 1; transform: translateY(0); }
}
#app > * {
  opacity: 0;
  animation: pageEnter 0.45s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

.isu-header{background:var(--isu);color:#fff;padding:0 1rem;height:var(--header-h);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.isu-header-title{font-size:16px;font-weight:600;}
.isu-header-sub{font-size:10px;opacity:0.8;margin-top:2px;}
.isu-back-btn{background:rgba(255,255,255,0.18);border:none;color:#fff;border-radius:var(--r-sm);padding:5px 10px;font-size:12px;font-family:'Fira Code',monospace;cursor:pointer;}
.isu-timer{font-size:26px;font-weight:600;font-family:'Fira Code',monospace;color:#fff;}
.isu-timer.urgent{color:#FFD0D0;animation:upulse 1s ease-in-out infinite;}
@keyframes upulse{0%,100%{opacity:1}50%{opacity:0.6}}
.btn{display:block;width:100%;padding:0.75rem 1rem;font-size:14px;font-weight:600;text-align:center;border:1.5px solid var(--border2);border-radius:var(--r-md);background:var(--bg);color:var(--text);cursor:pointer;font-family:'Fira Code',monospace;transition:opacity 0.12s;}
.btn:active{opacity:0.8;}
.btn.primary{background:var(--isu);color:#fff;border-color:transparent;}
.btn.secondary{background:var(--bg2);color:var(--text2);border-color:var(--border);font-size:13px;}
.btn.danger{background:transparent;color:var(--amber);border-color:var(--amber-br);font-size:13px;}
.btn.sm{padding:0.4rem 0.85rem;font-size:12px;width:auto;border-radius:var(--r-sm);}
.btn.green{background:var(--green);color:#fff;border-color:transparent;}
.btn.amber-btn{background:var(--amber);color:#fff;border-color:transparent;}
.login-wrap{padding:2.5rem 1.25rem 1.5rem;display:flex;flex-direction:column;gap:0.85rem;}
.login-logo{display:flex;flex-direction:column;align-items:center;margin-bottom:1rem;gap:8px;}
.input-group{display:flex;flex-direction:column;gap:5px;}
.input-label{font-size:11px;color:var(--text2);letter-spacing:0.05em;text-transform:uppercase;font-weight:500;}
.input-field{padding:0.7rem 0.9rem;font-size:14px;color:var(--text);background:var(--bg2);border:1.5px solid var(--border2);border-radius:var(--r-md);outline:none;width:100%;font-family:'Fira Code',monospace;}
.input-field:focus{border-color:var(--isu);}
.input-select{padding:0.7rem 0.9rem;font-size:14px;color:var(--text);background:var(--bg2);border:1.5px solid var(--border2);border-radius:var(--r-md);outline:none;width:100%;font-family:'Fira Code',monospace;appearance:none;-webkit-appearance:none;}
.input-select:focus{border-color:var(--isu);}
.password-wrap { position: relative; }
.password-wrap .input-field { padding-right: 2.8rem; }
.eye-btn {
  position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer; color: var(--text3);
  padding: 4px; display: flex; align-items: center; justify-content: center;
  font-size: 16px; line-height: 1;
}
.eye-btn:active { color: var(--isu); }
.login-error{font-size:12px;color:var(--isu);background:var(--isu-light);border:1px solid rgba(206,17,38,0.2);border-radius:var(--r-md);padding:0.55rem 0.85rem;display:none;}
.login-error.show{display:block;}
.section-label{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);font-weight:600;padding:0.65rem 1rem 0.35rem;border-bottom:0.5px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:space-between;}
.class-card{margin:0.85rem;padding:1rem 1.1rem;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r-lg);cursor:pointer;transition:border-color 0.15s;}
.class-card:active{border-color:var(--isu);}
.class-card:hover{border-color:var(--isu);}
.class-card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
.class-code{font-size:13px;font-weight:600;color:var(--isu);}
.class-section-badge{font-size:10px;background:var(--isu-light);color:var(--isu);border-radius:20px;padding:2px 8px;font-weight:600;}
.class-name{font-size:12px;font-weight:500;color:var(--text);margin-bottom:4px;line-height:1.4;}
.class-meta{font-size:11px;color:var(--text3);}
.class-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:0.5px solid var(--border);}
.class-enrolled{font-size:11px;color:var(--text2);}
.class-view-btn{font-size:11px;font-weight:600;color:var(--isu);background:none;border:none;cursor:pointer;font-family:'Fira Code',monospace;}
.add-class-btn{margin:0 0.85rem 0.85rem;display:block;width:calc(100% - 1.7rem);padding:0.75rem;font-size:13px;font-weight:600;text-align:center;border:1.5px dashed var(--border2);border-radius:var(--r-lg);background:transparent;color:var(--text2);cursor:pointer;font-family:'Fira Code',monospace;}
.add-class-btn:active{background:var(--bg2);}
.stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:1rem;}
.stat-card{background:var(--bg2);border-radius:var(--r-md);padding:0.75rem 0.5rem;text-align:center;border:0.5px solid var(--border);}
.stat-num{font-size:28px;font-weight:600;font-family:'Fira Code',monospace;}
.stat-lbl{font-size:10px;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;margin-top:3px;}
.stat-num.green{color:var(--green);}.stat-num.amber{color:var(--amber);}.stat-num.gray{color:var(--text3);}.stat-num.red{color:var(--red);}
.student-row{display:flex;align-items:center;justify-content:space-between;padding:0.6rem 1rem;border-bottom:0.5px solid var(--border);transition:background 0.15s;}
.student-row:last-child{border-bottom:none;}
.student-row.tappable{cursor:pointer;}
.student-row.tappable:active{background:var(--bg2);}
.avatar{width:32px;height:32px;border-radius:50%;background:#000;color:#fff;font-size:11px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.avatar.present{background:var(--green-bg);color:var(--green);}
.avatar.late{background:var(--amber-bg);color:var(--amber);}
.student-info{flex:1;margin:0 10px;}
.student-name{font-size:13px;font-weight:500;color:var(--text);}
.student-id{font-size:10px;color:var(--text3);font-family:'Fira Code',monospace;margin-top:1px;}
.status-pill{font-size:10px;font-weight:600;letter-spacing:0.04em;padding:3px 9px;border-radius:20px;white-space:nowrap;}
.status-pill.present{background:var(--green-bg);color:var(--green);border:0.5px solid var(--green-br);}
.status-pill.late{background:var(--amber-bg);color:var(--amber);border:0.5px solid var(--amber-br);}
.status-pill.absent{background:var(--bg2);color:var(--text3);border:0.5px solid var(--border);}
.status-pill.override{background:var(--blue-bg);color:var(--blue);border:0.5px solid rgba(21,101,192,0.2);}
#camera-wrap {
  position: relative;
  height: var(--scan-h);
  background: #0a0a0a;
  overflow: hidden;
  flex-shrink: 0; 
}
#camera-wrap video,#camera-wrap canvas{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;}
#camera-wrap canvas{display:none;}
.reticle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:240px;height:68px;pointer-events:none;}
.reticle::before,.reticle::after,.reticle-inner::before,.reticle-inner::after{content:'';position:absolute;width:20px;height:20px;border-color:#fff;border-style:solid;}
.reticle::before{top:0;left:0;border-width:2px 0 0 2px;}
.reticle::after{top:0;right:0;border-width:2px 2px 0 0;}
.reticle-inner::before{bottom:0;left:0;border-width:0 0 2px 2px;}
.reticle-inner::after{bottom:0;right:0;border-width:0 2px 2px 0;}
.scanline{position:absolute;left:12px;right:12px;height:2px;background:var(--isu);opacity:0.8;animation:scanline 2s linear infinite;}
@keyframes scanline{0%{top:8px}100%{top:calc(100% - 8px)}}
.camera-hint{position:absolute;bottom:10px;left:0;right:0;text-align:center;font-size:11px;color:rgba(255,255,255,0.5);}
.privacy-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.88);gap:8px;animation:fadeOut 0.4s ease 2.2s forwards;pointer-events:none;}
.privacy-overlay .p-icon{font-size:44px;}
.privacy-overlay .p-name{font-size:20px;font-weight:600;color:#fff;font-family:'Fira Code',monospace;}
.privacy-overlay .p-sub{font-size:12px;color:rgba(255,255,255,0.5);}
@keyframes fadeOut{to{opacity:0}}
.tab-bar{display:flex;border-bottom:1.5px solid var(--border);background:var(--bg);}
.tab-btn{flex:1;padding:0.6rem;font-size:12px;font-weight:600;font-family:'Fira Code',monospace;background:none;border:none;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1.5px;transition:color 0.15s,border-color 0.15s;}
.tab-btn.active{color:var(--isu);border-bottom-color:var(--isu);}
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:flex-end;justify-content:center;z-index:100;}
.sheet{background:var(--bg);border-radius:var(--r-lg) var(--r-lg) 0 0;padding:1.25rem 1.25rem 2rem;width:100%;max-width:390px;animation:slideUp 0.25s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 1rem;}
.sheet-name{font-size:16px;font-weight:600;color:var(--text);text-align:center;margin-bottom:4px;}
.sheet-sub{font-size:11px;color:var(--text3);text-align:center;margin-bottom:1.25rem;}
.sheet-btns{display:flex;flex-direction:column;gap:0.6rem;}
.sheet-cancel{font-size:13px;color:var(--text3);background:none;border:none;cursor:pointer;text-align:center;padding:0.5rem;font-family:'Fira Code',monospace;width:100%;margin-top:0.25rem;}
.duration-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:0.75rem 0;}
.dur-btn{padding:0.6rem 0;font-size:13px;font-weight:600;text-align:center;border:1.5px solid var(--border);border-radius:var(--r-md);background:var(--bg2);color:var(--text2);cursor:pointer;font-family:'Fira Code',monospace;}
.dur-btn.selected{border-color:var(--isu);background:var(--isu-light);color:var(--isu);}
.toast{padding:0.6rem 1rem;font-size:12px;font-weight:500;min-height:36px;display:flex;align-items:center;gap:6px;border-bottom:0.5px solid var(--border);}
.toast.ok{background:var(--green-bg);color:var(--green);}
.toast.late{background:var(--amber-bg);color:var(--amber);}
.toast.empty{background:var(--bg2);color:var(--text3);font-weight:400;}
.blind-bar{padding:0.8rem 1rem;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--border);background:var(--bg2);}
.blind-count{font-size:22px;font-weight:600;color:var(--green);font-family:'Fira Code',monospace;}
.blind-label{font-size:11px;color:var(--text3);}
.live-badge{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:#fff;}
.live-dot{width:7px;height:7px;border-radius:50%;background:#fff;animation:pulse 1.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}

/* ── Bottom navigation bar ────────────────────────────────── */
.bottom-nav{
  display:flex;align-items:center;justify-content:space-around;
  height:64px;background:var(--bg);
  border-top:0.5px solid var(--border);
  flex-shrink:0;
  position:sticky;bottom:0;
  width: 100%;
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  background:none;border:none;cursor:pointer;
  font-family:'Fira Code',monospace;font-size:10px;
  color:var(--text3);padding:8px 16px;
  transition:color 0.15s;
  -webkit-tap-highlight-color:transparent;
  flex:1;
}
.nav-item.active{color:var(--isu);}
.nav-icon{font-size:20px;line-height:1;}
.nav-dot{
  width:5px;height:5px;border-radius:50%;background:var(--isu);
  position:absolute;top:-2px;right:-2px;
}
.nav-icon-wrap{position:relative;display:inline-flex;}

/* ── Academic history card ───────────────────── */
.hist-card{
  background:var(--bg);border-radius:16px;
  padding:1.1rem 1.1rem 0.9rem;
  margin:0 0.85rem 0.85rem;
  box-shadow:0 8px 32px rgba(26,28,28,0.08);
}
.hist-card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:0.9rem;}
.hist-date{font-family:'Fira Code',monospace;font-size:17px;font-weight:700;color:var(--text);letter-spacing:-0.02em;}
.hist-dow{font-size:11px;color:var(--text3);margin-top:2px;}
.hist-present-badge{
  display:flex;align-items:center;gap:5px;
  background:var(--isu-light);color:var(--isu);
  font-size:11px;font-weight:600;border-radius:20px;
  padding:4px 10px;white-space:nowrap;
}
.hist-present-dot{width:6px;height:6px;border-radius:50%;background:var(--isu);flex-shrink:0;}
.hist-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.hist-stat-box{background:var(--bg2);border-radius:10px;padding:0.6rem 0.5rem;text-align:center;}
.hist-stat-lbl{font-size:9px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);font-weight:600;margin-bottom:3px;}
.hist-stat-num{font-size:20px;font-weight:700;font-family:'Fira Code',monospace;}
.hist-stat-num.red{color:var(--red);}
.hist-stat-num.amber{color:var(--amber);}
.hist-stat-num.muted{color:var(--text3);}

/* ── Session detail panel ─────────────────────────────────── */
.detail-panel{
  background:var(--bg);border-radius:16px;
  margin:0 0.85rem 1rem;
  box-shadow:0 8px 32px rgba(26,28,28,0.08);
  overflow:hidden;
}
.detail-panel-header{padding:1rem 1.1rem 0.75rem;}
.detail-panel-label{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--isu);font-weight:700;margin-bottom:4px;}
.detail-panel-date{font-family:'Fira Code',monospace;font-size:18px;font-weight:700;color:var(--text);letter-spacing:-0.01em;}
.detail-panel-sub{font-size:12px;color:var(--text3);margin-top:2px;}
.detail-group-label{
  display:flex;align-items:center;gap:8px;
  padding:0.6rem 1.1rem;
  font-size:13px;font-weight:600;color:var(--isu);
  border-top:0.5px solid var(--border);
}
.detail-student-row{
  display:flex;align-items:center;gap:10px;
  padding:0.65rem 1.1rem;
  border-top:0.5px solid var(--border);
}
.detail-avatar{
  width:36px;height:36px;border-radius:50%;
  background:var(--bg2);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:var(--text2);
  flex-shrink:0;
}
.detail-student-name{font-size:13px;font-weight:500;color:var(--text);}
.detail-student-id{font-size:10px;color:var(--text3);font-family:'Fira Code',monospace;}
.detail-mail-btn{margin-left:auto;background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:4px;}
.detail-edit-btn{
  display:block;width:calc(100% - 1.7rem);margin:0 0.85rem 1rem;
  padding:0.85rem;text-align:center;font-size:14px;font-weight:600;
  background:linear-gradient(135deg,#a30019,#ce1126);color:#fff;
  border:none;border-radius:12px;cursor:pointer;font-family:'Fira Code',monospace;
}
.detail-edit-btn:active{opacity:0.85;}

.summary-row{display:flex;align-items:center;justify-content:space-between;padding:0.65rem 1rem;border-bottom:0.5px solid var(--border);}
.summary-row:last-child{border-bottom:none;}
.empty-state{padding:2.5rem 1rem;text-align:center;color:var(--text3);font-size:12px;}
.note-box{margin:1rem;padding:0.75rem 0.9rem;background:var(--bg2);border-radius:var(--r-md);border:0.5px solid var(--border);font-size:11px;color:var(--text2);line-height:1.6;}
.footer-pad{padding:1rem;display:flex;flex-direction:column;gap:0.6rem;}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--isu);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.cam-error{display:flex;flex-direction:column;align-items:center;justify-content:center;height:var(--scan-h);background:#0a0a0a;gap:6px;}
.cam-error p{font-size:12px;color:rgba(255,255,255,0.45);text-align:center;padding:0 1.5rem;}
.typing-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;}
.typing-line{font-family:'Fira Code',monospace;font-size:34px;font-weight:600;color:var(--isu);overflow:hidden;white-space:nowrap;width:0;border-right:2.5px solid var(--isu);animation:typeIn 0.7s steps(5,end) 0.2s forwards,cursorBlink 0.8s step-end 0.9s 4,cursorFade 0.1s ease 3.5s forwards;}
.typing-sub{font-family:'Fira Code',monospace;font-size:11px;color:var(--text3);overflow:hidden;white-space:nowrap;width:0;opacity:0;animation:typeInSub 0.6s steps(28,end) 1.2s forwards;}
@keyframes typeIn{from{width:0}to{width:5ch}}
@keyframes typeInSub{from{width:0;opacity:1}to{width:28ch;opacity:1}}
@keyframes cursorBlink{0%,100%{border-color:var(--isu)}50%{border-color:transparent}}
@keyframes cursorFade{to{border-color:transparent}}
.backend-banner{margin:1rem;padding:0.75rem 0.9rem;background:var(--blue-bg);border-radius:var(--r-md);border:0.5px solid rgba(21,101,192,0.2);font-size:11px;color:var(--blue);line-height:1.6;}
.days-grid{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
.day-btn{padding:4px 10px;font-size:11px;font-weight:600;border:1.5px solid var(--border2);border-radius:20px;background:var(--bg2);color:var(--text2);cursor:pointer;font-family:'Fira Code',monospace;}
.day-btn.selected{border-color:var(--isu);background:var(--isu-light);color:var(--isu);}
</style>

<script>
/* ─── CONFIG ─────────────────────────────────────────── */
const FIREBASE_CONFIG = {

/* ─── Audio feedback ─────────────────────────────────────── */
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playSound(type) {
  try {
    const ctx = getAudioCtx();
    if (ctx.state === 'suspended') ctx.resume();
    const osc      = ctx.createOscillator();
    const gainNode = ctx.createGain();
    osc.connect(gainNode);
    gainNode.connect(ctx.destination);
    if (type === 'success') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.08);
      gainNode.gain.setValueAtTime(0.12, ctx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
      osc.start(); osc.stop(ctx.currentTime + 0.25);
    } else if (type === 'error') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(160, ctx.currentTime);
      gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
      osc.start(); osc.stop(ctx.currentTime + 0.35);
    }
  } catch(e) { }
}

async function recordScan(barcodeValue){
  const student=STUDENTS.find(s=>s.barcode.trim().toLowerCase()===barcodeValue.trim().toLowerCase());
  if(!student){ playSound('error'); showToast('Unknown ID: '+barcodeValue,'empty'); return; }
  if(attendance[student.id]){ playSound('error'); showToast('Already scanned: '+student.name,'empty'); return; }

  const elapsed = sessionSecs - remaining;
  const isLate = elapsed >= tardyThresholdSecs; 
  const scannedAt=new Date();
  
  attendance[student.id]={name:student.name,scannedAt,late:isLate,override:false};
  playSound('success');
  showPrivacyOverlay(student.name,isLate);
  showToast(isLate?student.name+' — marked tardy':student.name+' checked in',isLate?'late':'ok');
  updateCountBadge();
  try {
    await db.collection('sessions').doc(sessionDocID).update({
      ['attendance.'+student.id]:{name:student.name,scannedAt:firebase.firestore.Timestamp.fromDate(scannedAt),late:isLate,override:false}
    });
  } catch(e){ }
}

  reportData=[]; 
  try {
    const res = await fetch(`${FUNCTIONS_URL}/semesterReport?classId=${activeClass?activeClass.id:''}&professor=${encodeURIComponent(currentUser.email)}`,{method:'GET'});

  try {

    const snap = await q.get();
    const sessions = snap.docs.map(d=>d.data());
    const total=sessions.length;

      let present=0,late=0;
      sessions.forEach(sess=>{const r=(sess.attendance||{})[s.id];if(r){r.late?late++:present++;}});
      return{name:s.name,present,late,absent:total-present-late,rate:total>0?Math.round(((present+late)/total)*100):0,total};
    });
  } catch(e){ }
  phase='report'; 
  render();
}

/* ─── Camera ─────────────────────────────────────────────── */
function startCamera(){
  if(cameraRunning) return;
  const wrap=document.getElementById('camera-wrap');
  if(!wrap) return;

  Quagga.init({
    inputStream: { 
      type: 'LiveStream', 
      target: wrap, 
      constraints: { 
        facingMode: 'environment',
        width: { ideal: 640 },
        height: { ideal: 480 } 
      } 
    },
    decoder: { 
      // Restored full reader list to ensure it catches all ID types
      readers: ['code_128_reader', 'code_39_reader', 'code_93_reader', 'ean_reader', 'upc_reader', 'i2of5_reader', 'codabar_reader'] 
    },
    locate: true
  }, err => {
    if(err){
      wrap.innerHTML='<div class="cam-error"><p>Camera access denied.</p></div>';
      return;
    }
    Quagga.start(); 
    cameraRunning=true;
  });

  let lastVal=null, lastTime=0;
  Quagga.onDetected(result=>{
    const val=result.codeResult.code, now=Date.now();
    if(val===lastVal && now-lastTime<1500) return;
    lastVal=val; lastTime=now; 
    recordScan(val);
  });
}

function stopCamera(){
  if(!cameraRunning)return;
  try{Quagga.stop();}catch(e){}
  cameraRunning=false;
}

/* ─── Helpers ─────────────────────────────────────────────── */
function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
function fmtTime(d){if(!d)return'';const date=d instanceof Date?d:(d.toDate?d.toDate():new Date(d));return date.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function fmtMins(s){return s>=60?Math.round(s/60)+' min':s+'s';}
function presentCount(){return Object.values(attendance).filter(a=>!a.late).length;}
function lateCount(){return Object.values(attendance).filter(a=>a.late).length;}
function totalIn(){return Object.keys(attendance).length;}
function absentCount(){return STUDENTS.length-totalIn();}

function updateTimer(){
  const el=document.getElementById('timer');

}

function setTardyThreshold(secs){
  tardyThresholdSecs=secs;
  document.querySelectorAll('.tardy-btn').forEach(b=>b.classList.toggle('selected',parseInt(b.dataset.secs)===secs));
  updateDurNote();
}

function updateDurNote(){
  const n=document.getElementById('dur-note');
  if(n) n.innerHTML=`Session open for <strong>${fmtMins(sessionSecs)}</strong>.<br>Students scanning after <strong>${tardyThresholdSecs === 99999 ? 'Never' : fmtMins(tardyThresholdSecs)}</strong> are marked tardy.`;
}

function switchScanMode(mode){
  scanMode=mode;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));
  const cw=document.getElementById('camera-wrap');
  const mw=document.getElementById('manual-wrap');
  if(cw)cw.style.display=mode==='camera'?'block':'none';
  if(mw)mw.style.display=mode==='manual'?'block':'none';
  if(mode==='camera')requestAnimationFrame(()=>startCamera());
  else{stopCamera();updateManualRoster();}
}

function updateManualRoster(){
  const c=document.getElementById('manual-list');
  if(c)c.innerHTML=STUDENTS.map(s=>manualRowHTML(s)).join('');
}

function manualRowHTML(s){
  const a=attendance[s.id],checkedIn=!!a,isLate=a&&a.late;
  const pill=checkedIn?`<span class="status-pill ${isLate?'late':'present'}">${isLate?'Tardy':'Present'}</span>`:`<span class="status-pill absent">Absent</span>`;
  return `<div class="student-row${checkedIn?'':' tappable'}" onclick="${checkedIn?'':'openSheet(\''+s.id+'\')'}"><div class="avatar${isLate?' late':checkedIn?' present':''}">${s.name.charAt(0)}</div><div class="student-info"><div class="student-name">${s.name}</div><div class="student-id">${s.barcode}</div></div>${pill}</div>`;
}

function renderSummaryRows(){
  const c=document.getElementById('summary-roster');
  if(c)c.innerHTML=STUDENTS.map(s=>summaryRowHTML(s)).join('');
  const nums=document.querySelectorAll('.sum-num');
  if(nums[0])nums[0].textContent=presentCount();
  if(nums[1])nums[1].textContent=lateCount();
  if(nums[2])nums[2].textContent=absentCount();
}

function summaryRowHTML(s){
  const a=attendance[s.id];
  const present=!!a&&!a.late,late=!!a&&a.late,absent=!a;
  const color=present?'var(--green)':late?'var(--amber)':'var(--text2)';
  const pillClass=present?'present':late?'late':'absent';
  const pillText=present?(a.override?'Override':'Present'):late?(a.override?'Override':'Tardy'):'Absent';
  const time=a?fmtTime(a.scannedAt):'';
  let menuHTML='';
  if(overrideTarget===s.id){
    menuHTML=absent?`<div style="display:flex;gap:6px;margin-top:6px;" onclick="event.stopPropagation()"><button class="btn sm" onclick="overrideMarkPresent('${s.id}')" style="border-color:var(--green);color:var(--green);">Present</button><button class="btn sm" onclick="overrideMarkTardy('${s.id}')" style="border-color:var(--amber);color:var(--amber);">Tardy</button><button class="btn sm" onclick="toggleOverride('${s.id}')">Cancel</button></div>`
    :`<div style="display:flex;gap:6px;margin-top:6px;" onclick="event.stopPropagation()"><button class="btn sm" onclick="overrideMarkAbsent('${s.id}')" style="border-color:var(--red);color:var(--red);">Mark Absent</button><button class="btn sm" onclick="toggleOverride('${s.id}')">Cancel</button></div>`;
  }
  return `<div class="summary-row tappable" onclick="toggleOverride('${s.id}')" style="background:${present?'var(--green-bg)':late?'var(--amber-bg)':''}">
    <div style="display:flex;flex-direction:column;flex:1;">
      <div style="display:flex;align-items:center;justify-content:space-between;width:100%;">
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="avatar ${present?'present':late?'late':''}">${s.name.charAt(0)}</div>
          <div><div class="student-name" style="color:${color}">${s.name}</div><div class="student-id">${time?'Scanned '+time:'Tap to modify'}</div></div>
        </div>
        <span class="status-pill ${pillClass}${a&&a.override?' override':''}">${pillText}</span>
      </div>${menuHTML}
    </div>
  </div>`;
}

        </div>`;
    }
    let historyListHTML = '';
    let lastDate = null;
    historyData.forEach(sess => {
      const ld = fmtHistDate(sess.date);
      if (ld.full !== lastDate) {
        historyListHTML += `<div style="font-size:12px;font-weight:700;color:var(--text3);margin:1.5rem 1rem 0.75rem;">${ld.full}</div>`;

      }
      historyListHTML += histCardHTML(sess);
    });
    app.innerHTML=`<div class="isu-header"><div><div class="isu-header-title">History</div></div></div>
      <div style="flex:1;overflow-y:auto;background:var(--bg3);">${historyListHTML}</div>${bottomNav()}`;

  /* SEMESTER REPORT */
  if(phase==='report'){

      <div style="flex:1;overflow-y:auto;background:var(--bg3);padding:0.5rem 0;">

    return;
  }
}

/* ─── Redbird ─────────────────────────────────────────────── */
function initBird(){
  clearInterval(birdInterval);
  const CV=document.getElementById('redbird');if(!CV)return;
  const cx=CV.getContext('2d');cx.imageSmoothingEnabled=false;
  const Z=CV.width/16;
  const _R='#cc0000',_M='#aa0000',_D='#880000',_X='#550000',_H='#ee3333',_K='#0d0d0d',_Y='#ffcc00',_O='#e07020',_B='#b04800',_W='#8b5e3c',_G='#c45c00';
  function p(x,y,c){cx.fillStyle=c;cx.fillRect(x*Z,y*Z,Z,Z);}
  function base(){
    p(9,0,_R);p(8,1,_R);p(9,1,_R);p(7,2,_R);p(8,2,_R);p(9,2,_R);p(7,3,_R);p(8,3,_R);p(9,3,_R);p(10,3,_R);p(8,4,_R);p(9,4,_R);p(10,4,_R);p(11,4,_R);
